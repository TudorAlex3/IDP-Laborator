services:
    api:
        build: ./api
        ports:
            - "5000:80"
        environment:
            PGHOST: postgres
            PGUSER: admin
            PGPASSWORD: admin
            PGDATABASE: books
        depends_on:
            - postgres
        networks:
            - internal

    postgres:
        image: postgres:12
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: books
        volumes:
            - db-data:/var/lib/postgresql/data
            - ./init-scripts:/docker-entrypoint-initdb.d
        networks:
            - internal

    adminer:
        image: adminer:latest
        networks:
            - internal

    kong:
        image: kong:3.7
        volumes:
            - ./kong:/usr/local/kong/declarative
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
            KONG_PROXY_ACCESS_LOG: /dev/stdout
            KONG_ADMIN_ACCESS_LOG: /dev/stdout
            KONG_PROXY_ERROR_LOG: /dev/stderr
            KONG_ADMIN_ERROR_LOG: /dev/stderr
            KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
        ports:
            - "8000:8000"
            - "8443:8443"
        depends_on:
            - api
            - adminer
        networks:
            - internal

    prometheus:
        image: prom/prometheus:latest
        volumes:
            - ./prometheus:/etc/prometheus
        ports:
            - "9090:9090"
        depends_on:
            - kong
        networks:
            - internal

    grafana:
        image: grafana/grafana:latest
        ports:
            - "3000:3000"
        environment:
            GF_SECURITY_ADMIN_PASSWORD: admin
        depends_on:
            - prometheus
        networks:
            - internal

volumes:
    db-data:

networks:
    internal:
