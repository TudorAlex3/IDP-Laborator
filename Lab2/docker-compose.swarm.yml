version: "3.8"

services:
    # Nginx replicat pe cluster - demo replicare, scalare, load balancing
    web:
        image: nginx:alpine
        ports:
            - "8080:80"
        deploy:
            replicas: 3
            update_config:
                parallelism: 1
                delay: 5s
                order: start-first
            rollback_config:
                parallelism: 1
                delay: 5s
                order: start-first
            restart_policy:
                condition: on-failure

networks:
    default:
        driver: overlay
