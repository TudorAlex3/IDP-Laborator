services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

configs:
  prometheus_config:
    file: ../Configs/prometheus.yml

networks:
  monitoring-net:
    driver: overlay
    attachable: true
