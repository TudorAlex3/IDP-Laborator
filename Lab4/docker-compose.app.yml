services:
    api:
        image: lab4-api:latest
        ports:
            - "5000:80"
        environment:
            PGHOST: postgres
            PGUSER: admin
            PGPASSWORD: admin
            PGDATABASE: books
        depends_on:
            - postgres
        networks:
            - app-network

    postgres:
        image: postgres:12
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: books
        volumes:
            - db-data:/var/lib/postgresql/data
        networks:
            - app-network

volumes:
    db-data:

networks:
    app-network:
